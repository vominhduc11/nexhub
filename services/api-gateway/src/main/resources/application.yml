spring:
  application:
    name: ${SPRING_APPLICATION_NAME:api-gateway}
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}"
  cloud:
    config:
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://discovery-service:8761/eureka/}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:api-gateway}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus,gateway}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
    gateway:
      enabled: ${MANAGEMENT_ENDPOINT_GATEWAY_ENABLED:true}
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
  metrics:
    tags:
      service: ${MANAGEMENT_METRICS_TAGS_SERVICE:api-gateway}
      environment: ${MANAGEMENT_METRICS_TAGS_ENVIRONMENT:development}

logging:
  level:
    org:
      springframework:
        cloud:
          gateway: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY:INFO}
        security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
        web:
          reactive: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_REACTIVE:INFO}
    com:
      devwonder:
        api_gateway: ${LOGGING_LEVEL_COM_DEVWONDER_API_GATEWAY:DEBUG}
  pattern:
    console: "${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}"
    file: "${LOGGING_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}"
